}

function App(){

  const[loaded,setLoaded]=useState(false);
  const syncTimer=useRef(null);
  const skipAutoSync=useRef(false);

  // Auto-restore from GitHub on first load
  useEffect(()=>{
    if(!ghCfg.token){setLoaded(true);return}
    setSyncSt("⏳");
    ghRestore(ghCfg).then(d=>{
      if(d){
        skipAutoSync.current=true;
        if(d.observations)setObs(d.observations);
        if(d.treatments)setTrt(d.treatments);
        if(d.observations)sv("observations",d.observations);
        if(d.treatments)sv("treatments",d.treatments);
        setSyncSt("✅");
        setTimeout(()=>{setSyncSt("");skipAutoSync.current=false},1500);
      }else{setSyncSt("")}
      setLoaded(true);
    }).catch(()=>{setSyncSt("⚠️");setLoaded(true);setTimeout(()=>setSyncSt(""),3000)});
  },[]);

  // Save to localStorage always
  useEffect(()=>{sv("observations",observations)},[observations]);
  useEffect(()=>{sv("treatments",treatments)},[treatments]);
  useEffect(()=>{sv("ghcfg",ghCfg)},[ghCfg]);
  useEffect(()=>{sv("dark",dark);document.body.classList.toggle("dark",dark)},[dark]);

  // Auto-sync to GitHub (debounced 2s) on every data change
  useEffect(()=>{
    if(!loaded||skipAutoSync.current||!ghCfg.token)return;
    if(syncTimer.current)clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(()=>{
      setSyncSt("⏳");
      ghSync(ghCfg,{observations,treatments,at:new Date().toISOString(),v:VER}).then(r=>{
        if(r.ok){setSyncSt("✅");setTimeout(()=>setSyncSt(""),2000)}
        else{setSyncSt("⚠️");setTimeout(()=>setSyncSt(""),3000)}
      }).catch(()=>{setSyncSt("⚠️");setTimeout(()=>setSyncSt(""),3000)});
    },1500);
    return()=>{if(syncTimer.current)clearTimeout(syncTimer.current)};
